# ══════════════════════════════════════════════════
# Netlify Configuration — Wesley J. Morris LLC
# ══════════════════════════════════════════════════

[build]
  publish = "."          # Static site — all files are at root

# ── Custom domain ──
# After deploying, go to Netlify > Site settings > Domain management
# and add: wesleyjmorris.com
# Then configure your DNS registrar with Netlify's nameservers.

# ── Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache: long-lived for assets ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Redirects ──
# www → apex
[[redirects]]
  from   = "https://www.wesleyjmorris.com/*"
  to     = "https://wesleyjmorris.com/:splat"
  status = 301
  force  = true

# Netlify subdomain → custom domain (update subdomain once known)
# [[redirects]]
#   from   = "https://your-site-name.netlify.app/*"
#   to     = "https://wesleyjmorris.com/:splat"
#   status = 301
#   force  = true

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
